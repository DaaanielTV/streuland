name: Streuland
version: 1.0.0
main: de.streuland.StreulandPlugin
description: Random plot system with vanilla world generation
authors:
  - Developer
api-version: 1.13

commands:
  plot:
    description: Main plot command
    usage: /plot <help|create|claim|info|trust|untrust|home|list|unclaim|delete|confirm|cancel|generate|stats>
    aliases:
      - p
  district:
    description: District command
    usage: /district <info|progress|list>
    aliases:
      - city
