name: Streuland
version: 1.0.0
main: de.streuland.StreulandPlugin
description: Random plot system with vanilla world generation
authors:
  - Developer
api-version: 1.13

commands:
  plot:
    description: Main plot command
    usage: /plot <help|create|claim|info|trust|untrust|home|list|style|biome|weather|neighbor|quest|market|trader|inspect|admin|unclaim|delete|confirm|cancel|generate|stats|dashboard|portal>
    usage: /plot <help|create|claim|info|trust|untrust|home|list|style|biome|weather|neighbor|quest|market|trader|inspect|admin|unclaim|delete|confirm|cancel|generate|stats|dashboard|merge|split>
    usage: /plot <help|create|claim|info|team|home|list|style|biome|weather|neighbor|quest|market|trader|inspect|admin|unclaim|delete|confirm|cancel|generate|stats|dashboard>
    usage: /plot <help|create|claim|info|trust|untrust|home|list|style|biome|weather|neighbor|quest|market|trader|inspect|admin|unclaim|delete|confirm|cancel|generate|stats|dashboard|template>
    usage: /plot <help|create|claim|info|trust|untrust|home|list|style|biome|weather|neighbor|quest|market|sell|buy|auction|bid|trader|inspect|admin|unclaim|delete|confirm|cancel|generate|stats|dashboard>
    aliases:
      - p
  district:
    description: District command
    usage: /district <info|progress|list>
    aliases:
      - city

softdepend:
  - Vault

permissions:
  streuland.plot.admin.inspect:
    description: Allows inspection of block change history at coordinates
    default: op
  streuland.plot.admin.log:
    description: Allows viewing block change logs for any player
    default: op
  streuland.plot.admin.rollback:
    description: Allows preparing and confirming plot rollback
    default: op

  streuland.admin:
    description: Grants admin-level dashboard controls
    default: op
  streuland.portal.admin:
    description: Allows managing plot portals everywhere
    default: op

  streuland.market.*:
    description: Grants access to marketplace commands
    default: true
  streuland.market.sell:
    description: Allows listing plots on the marketplace
    default: true
  streuland.market.buy:
    description: Allows buying plots
    default: true
  streuland.market.auction:
    description: Allows creating plot auctions
    default: true
  streuland.market.bid:
    description: Allows bidding in plot auctions
    default: true
