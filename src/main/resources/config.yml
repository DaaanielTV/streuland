# Streuland Plot System Configuration

# World settings
world:
  name: "world"

# Plot settings
plot:
  # Size of each plot (in blocks, square)
  size: 64
  
  # Minimum distance between plot centers
  min-distance: 100
  
  # Maximum search radius for plot creation (in blocks from center of candidate location)
  max-search-radius: 5000
  
  # Default y-level for plots (will find terrain above this)
  base-height: 64

# Path settings
path:
  # Width of paths in blocks
  width: 4
  
  # Whether to use simple straight paths or try to curve slightly
  use-curves: true

# Protection settings
protection:
  # Allow visitors to interact with plots (doors, buttons, etc)
  allow-visitor-interact: false
  
  # List of allowed blocks for visitors to interact with (empty = none)
  # visitor-interact-whitelist:
  #   - DOOR
  #   - BUTTON

# Performance settings
async:
  # Run plot creation validation async before block changes
  validate-async: true
  
  # Run path generation async
  path-generation-async: true

# Terrain validation
terrain:
  # Blocks that indicate water (reject plot)
  water-rejection: true
  
  # Blocks that indicate lava (reject plot)
  lava-rejection: true
  
  # Adjacent water block count threshold (reject if >= this number)
  adjacent-water-threshold: 3

# Storage
storage:
  # File format: yaml or json
  format: yaml
  
  # Folder where plot data is stored
  data-folder: "plots"

# Biome-dependent plot effects
biomes:
  # Enable biome logic globally
  enabled: true
  # Base effects per biome (keys should match Bukkit biome enum names)
  effects:
    PLAINS:
      enabled: true
      priority: 0
      build-rules:
        - "ALLOW_REDSTONE"
      resource-multipliers:
        crop-growth: 1.1
        mob-loot: 1.0
      environment-constraints:
        max-build-height: 200
      stacked-effects:
        - "spring_festival"
    DESERT:
      enabled: true
      priority: 0
      build-rules:
        - "LIMIT_WATER"
      resource-multipliers:
        crop-growth: 0.8
        mining: 1.1
      environment-constraints:
        max-build-height: 160
  # Stackable global effects that can be referenced by id
  stacked-effects:
    spring_festival:
      enabled: true
      priority: 100
      build-rules:
        - "ALLOW_DECORATIVE_FLOWERS"
      resource-multipliers:
        crop-growth: 1.25
      environment-constraints:
        max-build-height: 210

# Plot upgrades and progression
plot-upgrades:
  max-level: 10
  levels:
    "1":
      plot-size: 64
      feature-slots: 1
      special-mechanics:
        - "BASIC_WARP"
    "2":
      plot-size: 80
      feature-slots: 2
      special-mechanics:
        - "BASIC_WARP"
        - "DECOR_BONUS"
  upgrades:
    level-1-2:
      from-level: 1
      to-level: 2
      vault-cost: 2500
      item-costs:
        DIAMOND: 4
        GOLD_INGOT: 16
      cooldown-seconds: 3600
      required-unlocks:
        - "PLOT_VISITS_10"

# Intelligent plot distribution weights
plot-distribution:
  weights:
    terrain: 0.35
    biome: 0.2
    infrastructure: 0.3
    player-density: 0.15
  terrain-avoid:
    - "OCEAN"
    - "BADLANDS"
  async-batch-size: 128
  debug:
    enabled: false
    heatmap: false
