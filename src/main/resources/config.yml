# Streuland Plot System Configuration

# World settings
world:
  name: "world_main"

# Plot settings
plot:
  # Size of each plot (in blocks, square)
  size: 64
  
  # Minimum distance between plot centers
  min-distance: 100
  
  # Maximum search radius for plot creation (in blocks from center of candidate location)
  max-search-radius: 5000
  
  # Default y-level for plots (will find terrain above this)
  base-height: 64

  # Maximum number of claimed plots a player can own
  max-plots-per-player: 4

  # Confirmation timeout in seconds for /plot delete
  delete-confirm-timeout-seconds: 30

  # Cooldown in seconds for /plot teleport <world> <plot_id>
  world-teleport-cooldown-seconds: 15

# Path settings
path:
  # Width of paths in blocks
  width: 4
  
  # Whether to use simple straight paths or try to curve slightly
  use-curves: true

# Protection settings
protection:
  # Allow visitors to interact with plots (doors, buttons, etc)
  allow-visitor-interact: false
  
  # List of allowed blocks for visitors to interact with (empty = none)
  # visitor-interact-whitelist:
  #   - DOOR
  #   - BUTTON

# Role-permission mapping for plot teams
roles:
  OWNER: [BUILD, BREAK, INTERACT, TRANSFER]
  CO_OWNER: [BUILD, BREAK, INTERACT, TRANSFER]
  MEMBER: [BUILD, BREAK, INTERACT]
  BUILDER: [BUILD, BREAK]
  VISITOR: [INTERACT]

# Performance settings
async:
  # Run plot creation validation async before block changes
  validate-async: true
  
  # Run path generation async
  path-generation-async: true

# Terrain validation
terrain:
  # Blocks that indicate water (reject plot)
  water-rejection: true
  
  # Blocks that indicate lava (reject plot)
  lava-rejection: true
  
  # Adjacent water block count threshold (reject if >= this number)
  adjacent-water-threshold: 3

# Storage
storage:
  # Storage backend for plot persistence: yaml or sqlite
  type: yaml

  # Folder where YAML plot data is stored
  data-folder: "plots"

  # SQLite file relative to plugin data folder
  sqlite-file: "db.sqlite"

  # Optional one-time migration from YAML files to SQLite
  migrate-yaml-on-startup: false

# Biome-dependent plot effects
biomes:
  # Enable biome logic globally
  enabled: true
  # Base effects per biome (keys should match Bukkit biome enum names)
  effects:
    PLAINS:
      enabled: true
      priority: 0
      build-rules:
        - "ALLOW_REDSTONE"
      resource-multipliers:
        crop-growth: 1.1
      environment-constraints:
        max-build-height: 200
      bonuses:
        farmland-area-multiplier: 1.2
    DARK_FOREST:
      enabled: true
      priority: 0
      build-rules:
        - "LOW_LIGHT_DECOR"
      resource-multipliers:
        mob-loot: 1.15
      environment-constraints:
        max-build-height: 180
      bonuses:
        night-vision: true
        mob-spawn-rate-multiplier: 1.25
    DESERT:
      enabled: true
      priority: 0
      build-rules:
        - "LIMIT_WATER"
      resource-multipliers:
        mining: 1.1
      environment-constraints:
        max-build-height: 160
      bonuses:
        heat-resistance-on-spawn: true
    JUNGLE:
      enabled: true
      priority: 0
      build-rules:
        - "ALLOW_TREE_CANOPY"
      bonuses:
        rain-harvest-multiplier: 1.3
    SNOWY_PLAINS:
      enabled: true
      priority: 0
      build-rules:
        - "ALLOW_ICE_SCULPTURE"
      bonuses:
        snowy-decay-rate-multiplier: 0.75
  # Stackable global effects that can be referenced by id
  stacked-effects:
    spring_festival:
      enabled: true
      priority: 100
      build-rules:
        - "ALLOW_DECORATIVE_FLOWERS"
      resource-multipliers:
        crop-growth: 1.25
      environment-constraints:
        max-build-height: 210

# Plot upgrades and progression
plot-upgrades:
  max-level: 10
  levels:
    "1":
      plot-size: 64
      feature-slots: 1
      special-mechanics:
        - "BASIC_WARP"
    "2":
      plot-size: 80
      feature-slots: 2
      special-mechanics:
        - "BASIC_WARP"
        - "DECOR_BONUS"
  upgrades:
    level-1-2:
      from-level: 1
      to-level: 2
      vault-cost: 2500
      item-costs:
        DIAMOND: 4
        GOLD_INGOT: 16
      cooldown-seconds: 3600
      required-unlocks:
        - "PLOT_VISITS_10"

# Intelligent plot distribution weights
plot-distribution:
  weights:
    terrain: 0.35
    biome: 0.2
    infrastructure: 0.3
    player-density: 0.15
  terrain-avoid:
    - "OCEAN"
    - "BADLANDS"
  async-batch-size: 128
  debug:
    enabled: false
    heatmap: false
# Snapshot settings
snapshot:
  # Max snapshots per plot
  max-per-plot: 5

  # Chunks processed per tick when capturing
  chunk-batch: 2

  # Blocks per tick when restoring
  restore-batch-size: 500

  # Delay in ticks between restore batches
  restore-batch-delay: 1
# District development
districts:
  # Interval (ticks) for sampling active players in districts
  active-player-interval-ticks: 200

# Web dashboard
dashboard:
  enabled: true
  port: 8080
  websocket-port: 8081
  heatmap-cell-size: 64

# Dynamic seasonal weather system
weather:
  # Number of in-game days per season
  season-duration-days: 7
  # Number of ticks that represent a full in-game day for season progression
  day-length-ticks: 24000
  effects:
    spring:
      jungle-harvest-yield-multiplier: 1.3
      crop-growth-multiplier: 1.2
    summer:
      desert-speed-amplifier: 1
      crop-water-need-multiplier: 1.35
    fall:
      plains-auto-harvest: true
    winter:
      snowy-decay-rate-multiplier: 0.5
      snowy-mob-spawn-multiplier: 0.7

i18n:
  default-locale: "en"
# Lightweight admin web API/dashboard
web:
  enabled: false
  port: 8090
  token: "change-me"
