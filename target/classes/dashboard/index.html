<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streuland Neighborhood Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="/streuland-dashboard/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>Streuland District & Neighborhood Dashboard</h1>
      <p id="roleBanner">Role: viewer (read-only)</p>
    </header>

    <section class="panel">
      <h2>District Map + Live Build Heatmap</h2>
      <div id="map"></div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Neighborhood Resource Graph</h2>
        <label>Plot ID: <input id="plotIdInput" placeholder="plot_123" /></label>
        <button id="loadNeighborhood">Load</button>
        <canvas id="neighborhoodGraph" width="500" height="260"></canvas>
      </article>

      <article class="panel">
        <h2>Market Listings + Price History</h2>
        <select id="listingSelect"></select>
        <canvas id="marketChart" width="500" height="260"></canvas>
      </article>
    </section>

    <section class="panel">
      <h2>Biome Statistics</h2>
      <canvas id="biomeChart" width="900" height="260"></canvas>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/streuland-dashboard/app.js"></script>
</body>
</html>
