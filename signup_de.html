<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Registrierung</title>
</head>
<body>
  <h1>Registrierung</h1>
  <form id="signupForm">
    <label>Invite Code: <input name="code" required/></label><br/>
    <label>Passwort: <input type="password" name="password" required/></label><br/>
    <button type="submit">Registrieren</button>
  </form>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      alert('Registrierung-Flow Platzhalter');
    });
  </script>
</body>
</html>
